<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> The Egg Timer</title>
  <script src="./index.js" defer></script>

</head>
<link rel="stylesheet" href="style.css"/>
<body>

<div class="center">
  <span id="egg">
    <span id="egg_white" class="hard"></span>
    <span id="yolk" class="hard"></span>
  </span>

  <input type="range" min="3" max="20" value="3" step="1" id="timer">
  <span id="timer_value">3</span>

  <button id="cooker">Crack</button>

</div>


</body>
</html>
